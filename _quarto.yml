project:
  type: book

lang: es

book:
  title: "Álgebra Lineal Numérica Para Aprendizaje Estadístico"
  subtitle: "Notas de Estudio del Curso 2026"
  author:
    name: "Miguel Trias"
    affiliations:
        - name: "Udelar"
          department: "Facultad de Ciencias Económicas y Administración"
          city: "Montevideo"
          country: "Uruguay"
  date: last-modified
  license: "CC BY-NC-SA"
  abstract: |
    Éste libro compila el material de estudio del curso Álgebra Lineal Para Aprendizaje Estadístico del año 2026.
    Está basado en los apuntes de clase del Profesor Diego Armentano y en las cátedras del Profesor Gilbert Strang.
  description: "Libro sobre álgebra lineal computacional"
  keyword: "Álgebra Lineal, SVD, Machine Learning, FCEA, ALNAE, Aprendizaje Estadístico, Álgebra Matricial"
  repo-url: https://github.com/mtrias/alnae
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - file: intro.qmd
      text: Introducción
    - file: clase-2.qmd
      text: Clase 2
    - file: clase-3.qmd
      text: Clase 3 ~18/3
    - file: clase-4.qmd
      text: Clase 4 ~20/3
    - file: clase-5.qmd
      text: Clase 5 ~25/3
    - file: clase-6.qmd
      text: Clase 6 ~27/3
    - file: clase-7.qmd
      text: Clase 7 ~8/4
    - file: clase-7-bis.qmd
      text: Clase 7 Bis
    - file: clase-8.qmd
      text: Clase 8 ~17/4
    - file: clase-9.qmd
      text: Clase 9 22/4
  appendices:
    - file: strang-gauss-lu.qmd
    - file: strang-svd.qmd
    - file: strang-qlq.qmd
  references: references.qmd

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    respect-user-color-scheme: true
    css: styles.css
    toc: true
    math: mathjax
    number-sections: false
    anchor-sections: true
    smooth-scroll: true
    include-after-body: toggle-citations.html


